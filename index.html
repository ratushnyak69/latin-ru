<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latinica.nr</title>
 <link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #80A6FF;
    --accent-dim: rgba(128,166,255,0.12);
    --accent-muted: rgba(128,166,255,0.35);
    --radius: 16px;
    --font-display: 'Unbounded', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --surface: #f4f4f6;
      --surface2: #ebebef;
      --border: rgba(0,0,0,0.07);
      --border-active: rgba(128,166,255,0.5);
      --text: #80A6FF;
      --text-muted: rgba(128,166,255,0.45);
      --text-dim: rgba(128,166,255,0.7);
    }
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e0e11;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: rgba(255,255,255,0.07);
      --border-active: rgba(128,166,255,0.4);
      --text: #80A6FF;
      --text-muted: rgba(128,166,255,0.4);
      --text-dim: rgba(128,166,255,0.65);
    }
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow-x: hidden; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 48px;
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .logo span { color: var(--text-muted); font-weight: 300; }

  .stats { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }

  .direction-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .dir-btn {
    flex: 1;
    padding: 10px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .dir-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .swap-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    font-size: 16px;
    flex-shrink: 0;
  }

  .swap-btn:hover { border-color: var(--border-active); color: var(--accent); transform: rotate(180deg); }

  .editors {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex: 1;
  }

  @media (max-width: 680px) { .editors { grid-template-columns: 1fr; } }

  .editor-wrap {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .editor-wrap:focus-within { border-color: var(--border-active); }
  .editor-wrap.output-wrap { background: var(--surface2); border-color: transparent; }

  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .editor-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .editor-label.active-label { color: var(--accent); }
  .char-count { font-size: 11px; color: var(--text-muted); }

  textarea {
    width: 100%;
    min-height: 420px;
    padding: 20px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.75;
    resize: vertical;
    caret-color: var(--accent);
  }

  textarea::placeholder { color: var(--text-muted); }
  textarea[readonly] { cursor: default; color: var(--text-dim); }

  .progress-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.2s;
    width: 0%;
  }

  .progress-fill.warn { background: #f0a04a; }
  .progress-fill.over { background: #f04a4a; }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .wc-bar { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; }

  .action-btns { display: flex; gap: 10px; align-items: center; }

  .btn {
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .btn:hover { border-color: var(--border-active); color: var(--accent); }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }

  .btn.primary:hover { opacity: 0.88; }
  .btn.primary:active { transform: scale(0.97); }

  .copy-badge {
    font-size: 11px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 0.06em;
  }

  .copy-badge.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Latinica<span>.nr</span></div>
    <div class="stats" id="wc-display">0 slov · 0 simvolov</div>
  </header>

  <div class="direction-bar">
    <button class="dir-btn active" id="btn-ru-lat" onclick="setMode('ru-lat')">Kirillica → Latinica</button>
    <button class="swap-btn" onclick="swapMode()" title="Pomenatj napravlenie">⇄</button>
    <button class="dir-btn" id="btn-lat-ru" onclick="setMode('lat-ru')">Latinica → Kirillica</button>
  </div>

  <div class="editors">
    <div class="editor-wrap">
      <div class="editor-header">
        <span class="editor-label active-label" id="label-in">Kirillica</span>
        <span class="char-count" id="char-in">0</span>
      </div>
      <textarea id="src" placeholder="Vstavjte ili napišite tekst zdesj...&#10;Do 5 stranic (~10 000 simvolov)"></textarea>
    </div>

    <div class="editor-wrap output-wrap">
      <div class="editor-header">
        <span class="editor-label" id="label-out">Latinica</span>
        <span class="char-count" id="char-out">0</span>
      </div>
      <textarea id="dst" readonly placeholder="Rezuljtat poävitsä zdesj..."></textarea>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="bottom-bar">
    <div class="wc-bar" id="limit-info">Limit: 10 000 simvolov (~5 stranic)</div>
    <div class="action-btns">
      <button class="btn" onclick="clearAll()">Očistitj</button>
      <button class="btn" onclick="pasteText()">Vstavitj</button>
      <button class="btn primary" onclick="copyResult()">Kopirovatj</button>
      <span class="copy-badge" id="badge">Skopirovano ✓</span>
    </div>
  </div>

</div>
<script>
const LIMIT = 10000;
const CYR = ['А','Б','В','Г','Д','Е','Ж','З','И','Й','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ц','Ч','Ш','Щ','Ы','Ь','Ъ','Э','Ё','Ю','Я','а','б','в','г','д','е','ж','з','и','й','к','л','м','н','о','п','р','с','т','у','ф','х','ц','ч','ш','щ','ы','ь','ъ','э','ё','ю','я'];
const LAT = ['A','B','V','G','D','E','Ž','Z','I','J','K','L','M','N','O','P','R','S','T','U','F','X','C','Č','Š','Ş','Y','j','J','E','Ö','Ü','Ä','a','b','v','g','d','e','ž','z','i','j','k','l','m','n','o','p','r','s','t','u','f','x','c','č','š','ş','y','j','j','e','ö','ü','ä'];

const CYR2LAT = {}, LAT2CYR = {};
CYR.forEach((c,i) => { CYR2LAT[c] = LAT[i]; });
LAT.forEach((l,i) => { if (!LAT2CYR[l]) LAT2CYR[l] = CYR[i]; });

let mode = 'ru-lat';
const src = document.getElementById('src');
const dst = document.getElementById('dst');

function translitRuLat(t) { return t.split('').map(c => CYR2LAT[c] ?? c).join(''); }
function translitLatRu(t) { return t.split('').map(c => LAT2CYR[c] ?? c).join(''); }
function convert(t) { return mode === 'ru-lat' ? translitRuLat(t) : translitLatRu(t); }

src.addEventListener('input', function() {
  if (this.value.length > LIMIT) this.value = this.value.slice(0, LIMIT);
  update();
});

function update() {
  const text = src.value;
  dst.value = convert(text);
  const len = text.length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('char-in').textContent = len;
  document.getElementById('char-out').textContent = dst.value.length;
  document.getElementById('wc-display').textContent = words + ' slov · ' + len + ' simvolov';
  const pct = Math.min((len / LIMIT) * 100, 100);
  const bar = document.getElementById('progress');
  bar.style.width = pct + '%';
  bar.className = 'progress-fill' + (pct > 90 ? ' over' : pct > 70 ? ' warn' : '');
}

function setMode(m) {
  mode = m;
  const isRuLat = m === 'ru-lat';
  document.getElementById('btn-ru-lat').className = 'dir-btn' + (isRuLat ? ' active' : '');
  document.getElementById('btn-lat-ru').className = 'dir-btn' + (!isRuLat ? ' active' : '');
  document.getElementById('label-in').textContent = isRuLat ? 'Kirillica' : 'Latinica';
  document.getElementById('label-out').textContent = isRuLat ? 'Latinica' : 'Kirillica';
  src.placeholder = isRuLat
    ? 'Vstavjte ili napišite tekst zdesj...\nDo 5 stranic (~10 000 simvolov)'
    : 'Vstavjte ili napišite tekst zdesj...\nDo 5 stranic (~10 000 simvolov)';
  update();
}

function swapMode() {
  const converted = dst.value;
  setMode(mode === 'ru-lat' ? 'lat-ru' : 'ru-lat');
  src.value = converted;
  update();
}

function clearAll() { src.value = ''; dst.value = ''; update(); }

function pasteText() {
  navigator.clipboard.readText().then(text => {
    src.value = text.slice(0, LIMIT);
    update();
  });
}

function copyResult() {
  if (!dst.value) return;
  navigator.clipboard.writeText(dst.value).then(() => {
    const b = document.getElementById('badge');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 1800);
  });
}
</script>
</body>
</html>
